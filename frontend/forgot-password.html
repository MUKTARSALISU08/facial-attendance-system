<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - SFRAS AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabler-icons@1.34.0/iconfont/tabler-icons.min.css">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/icons/favicon.svg">
  <link rel="apple-touch-icon" href="assets/images/icons/favicon.svg">
  <meta name="theme-color" content="#1e3a5f">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-face-id" width="40" height="40" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
          <path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
          <path d="M9 10l-1.5 2.5" />
          <path d="M15 10l1.5 2.5" />
          <path d="M7 16l5 -3l5 3" />
          <path d="M15 16l0 3" />
          <path d="M9 16l0 3" />
        </svg>
      </div>
      <h1 class="login-title">SFRAS AI</h1>
      <p class="login-subtitle">Smart Facial Recognition Attendance System</p>
    </div>

    <form id="forgot-password-form" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group" id="form-error" style="color: var(--danger); margin-top: 10px; display: none;"></div>
      <div class="form-group" id="form-success" style="color: var(--success); margin-top: 10px; display: none;"></div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-mail" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
          <path d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10" />
          <path d="M3 7l9 6l9 -6" />
        </svg>
        Send Reset Link
      </button>
    </form>

    <div class="login-footer">
      <p>Remember your password? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast">
    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-check-circle" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
      <path d="M9 12l2 2l4 -4" />
      <circle cx="12" cy="12" r="10" />
    </svg>
    <span class="toast-message" id="toast-message"></span>
  </div>

  <script>
    // Show toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      
      toast.className = `toast show ${type}`;
      toastMessage.textContent = message;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Handle forgot password form submission
    document.getElementById('forgot-password-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const errorDiv = document.getElementById('form-error');
      const successDiv = document.getElementById('form-success');
      
      // Hide previous messages
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      try {
        const response = await fetch('https://facial-attendance-system-production.up.railway.app/api/auth/forgot-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          successDiv.textContent = data.message;
          successDiv.style.display = 'block';
          document.getElementById('email').value = '';
          showToast(data.message, 'success');
        } else {
          errorDiv.textContent = data.message || 'Failed to send reset link';
          errorDiv.style.display = 'block';
          showToast(data.message || 'Failed to send reset link', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.style.display = 'block';
        showToast('An error occurred. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
