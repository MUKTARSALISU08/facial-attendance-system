<script src="profile-image-module.js"></script>
<script src="js/main.js"></script>
<script>
// ===================================================================
// SETTINGS PAGE - CORE FUNCTIONALITY ONLY
// No profile image logic here - it's all in profile-image-module.js
// ===================================================================

// Sidebar Toggle Functionality
const sidebar = document.getElementById('sidebar');
const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
const mainContent = document.getElementById('main-content');
const sidebarOverlay = document.getElementById('sidebar-overlay');

sidebarToggleBtn.addEventListener('click', () => {
  if (window.innerWidth <= 768) {
    sidebar.classList.toggle('mobile-open');
    sidebarOverlay.classList.toggle('active');
  } else {
    sidebar.classList.toggle('collapsed');
    sidebarToggleBtn.classList.toggle('collapsed');
    mainContent.classList.toggle('full-width');
  }
});

sidebarOverlay.addEventListener('click', () => {
  sidebar.classList.remove('mobile-open');
  sidebarOverlay.classList.remove('active');
});

window.addEventListener('resize', () => {
  if (window.innerWidth > 768) {
    sidebar.classList.remove('mobile-open');
    sidebarOverlay.classList.remove('active');
  }
});

// User Profile Dropdown
const userProfile = document.getElementById('user-profile');
const userProfileDropdown = document.getElementById('user-profile-dropdown');

userProfile.addEventListener('click', (e) => {
  e.stopPropagation();
  userProfileDropdown.classList.toggle('active');
});

document.addEventListener('click', () => {
  userProfileDropdown.classList.remove('active');
});

userProfileDropdown.addEventListener('click', (e) => {
  e.stopPropagation();
});

// Logout functionality
document.getElementById('logout-link').addEventListener('click', (e) => {
  e.preventDefault();
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  window.location.href = 'login.html';
});

// Update user info from localStorage
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (user.name) {
  document.getElementById('user-name').textContent = user.name;
}

// Settings navigation
document.querySelectorAll('.settings-nav-link').forEach(link => {
  link.addEventListener('click', function(e) {
    e.preventDefault();

    document.querySelectorAll('.settings-nav-link').forEach(l => l.classList.remove('active'));
    document.querySelectorAll('.settings-section').forEach(section => {
      section.style.display = 'none';
    });

    this.classList.add('active');
    const sectionId = this.getAttribute('data-section');
    document.getElementById(sectionId).style.display = 'block';
  });
});

// Password toggle functionality
document.querySelectorAll('.password-toggle').forEach(toggle => {
  toggle.addEventListener('click', function() {
    const input = this.previousElementSibling;
    const type = input.type === 'password' ? 'text' : 'password';
    input.type = type;

    const icon = this.querySelector('svg');
    if (type === 'text') {
      icon.outerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-eye-off" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M17.94 17.94a10 10 0 0 1 -14.078 -14.08" /><path d="M16.71 16.71a8 8 0 0 0 -10.678 -10.68" /><path d="M7.5 4.5l9 9" /><path d="M12 12l.01 0" /></svg>';
    } else {
      icon.outerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-eye" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 12m-2 0a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" /><path d="M22 12c-2.667 4.667 -6 7 -10 7s-7.333 -2.333 -10 -7c2.667 -4.667 6 -7 10 -7s7.333 2.333 10 7" /></svg>';
    }
  });
});

// Password form submission
document.getElementById('password-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const currentPassword = document.getElementById('current-password').value;
  const newPassword = document.getElementById('new-password').value;
  const confirmPassword = document.getElementById('confirm-password').value;

  if (newPassword !== confirmPassword) {
    alert('New passwords do not match');
    return;
  }

  try {
    const token = localStorage.getItem('token');
    const response = await fetch('http://localhost:3000/api/auth/change-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-auth-token': token
      },
      body: JSON.stringify({ currentPassword, newPassword })
    });

    const result = await response.json();

    if (response.ok) {
      alert('Password changed successfully!');
      this.reset();
    } else {
      alert(result.message || 'Failed to change password');
    }
  } catch (error) {
    console.error('Error:', error);
    alert('Failed to change password');
  }
});

// System settings save
document.getElementById('system-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  alert('System settings saved (demo only)');
});

// Toast notification function
function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
</script>
