<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - SFRAS AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabler-icons@1.34.0/iconfont/tabler-icons.min.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-face-id" width="40" height="40" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
          <path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
          <path d="M9 10l-1.5 2.5" />
          <path d="M15 10l1.5 2.5" />
          <path d="M7 16l5 -3l5 3" />
          <path d="M15 16l0 3" />
          <path d="M9 16l0 3" />
        </svg>
      </div>
      <h1 class="login-title">SFRAS AI</h1>
      <p class="login-subtitle">Reset Your Password</p>
    </div>

    <form id="reset-password-form" class="login-form">
      <div class="form-group password-input-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" name="newPassword" placeholder="Enter new password" required>
        <button type="button" class="password-toggle" id="toggle-new">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-eye" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
            <path d="M15 12a3 3 0 1 1 -6 0a3 3 0 0 1 6 0" />
            <path d="M2.05 12c0 -3 1.85 -5.45 5 -6.98a1.9 1.9 0 0 1 2.56 1.07l3.5 4.67a1.9 1.9 0 0 1 -.7 2.73c-2.15 1.53 -5 3.98 -5 6.98" />
            <path d="M21.95 12c0 -3 -1.85 -5.45 -5 -6.98a1.9 1.9 0 0 0 -2.56 1.07l-3.5 4.67a1.9 1.9 0 0 0 .7 2.73c2.15 1.53 5 3.98 5 6.98" />
          </svg>
        </button>
      </div>

      <div class="form-group password-input-group">
        <label for="confirm-password">Confirm New Password</label>
        <input type="password" id="confirm-password" name="confirmPassword" placeholder="Confirm new password" required>
        <button type="button" class="password-toggle" id="toggle-confirm">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-eye" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
            <path d="M15 12a3 3 0 1 1 -6 0a3 3 0 0 1 6 0" />
            <path d="M2.05 12c0 -3 1.85 -5.45 5 -6.98a1.9 1.9 0 0 1 2.56 1.07l3.5 4.67a1.9 1.9 0 0 1 -.7 2.73c-2.15 1.53 -5 3.98 -5 6.98" />
            <path d="M21.95 12c0 -3 -1.85 -5.45 -5 -6.98a1.9 1.9 0 0 0 -2.56 1.07l-3.5 4.67a1.9 1.9 0 0 0 .7 2.73c2.15 1.53 5 3.98 5 6.98" />
          </svg>
        </button>
      </div>

      <div class="form-group" id="form-error" style="color: var(--danger); margin-top: 10px; display: none;"></div>
      <div class="form-group" id="form-success" style="color: var(--success); margin-top: 10px; display: none;"></div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-key" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
          <path d="M21 15v4a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-4" />
          <path d="M15 8h-1l-1 3m4 3h-6l-1 3" />
          <path d="M12 12l0 0" />
        </svg>
        Reset Password
      </button>
    </form>

    <div class="login-footer">
      <p>Go back to <a href="login.html">Login</a></p>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast">
    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-check-circle" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
      <path d="M9 12l2 2l4 -4" />
      <circle cx="12" cy="12" r="10" />
    </svg>
    <span class="toast-message" id="toast-message"></span>
  </div>

  <script>
    // Get token from URL
    function getUrlParameter(name) {
      name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
      const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
      const results = regex.exec(location.search);
      return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    const resetToken = getUrlParameter('token');

    // Show toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      
      toast.className = `toast show ${type}`;
      toastMessage.textContent = message;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Password visibility toggle
    document.querySelectorAll('.password-toggle').forEach(toggle => {
      toggle.addEventListener('click', function() {
        const input = this.previousElementSibling;
        const type = input.type === 'password' ? 'text' : 'password';
        input.type = type;
        const icon = this.querySelector('svg');
        if (type === 'text') {
          icon.outerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-eye-off" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M17.94 17.94a10 10 0 0 1 -14.078 -14.08" /><path d="M16.71 16.71a8 8 0 0 0 -10.678 -10.68" /><path d="M7.5 4.5l9 9" /><path d="M12 12l.01 0" /></svg>';
        } else {
          icon.outerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-eye" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 12a3 3 0 1 1 -6 0a3 3 0 0 1 6 0" /><path d="M2.05 12c0 -3 1.85 -5.45 5 -6.98a1.9 1.9 0 0 1 2.56 1.07l3.5 4.67a1.9 1.9 0 0 1 -.7 2.73c-2.15 1.53 -5 3.98 -5 6.98" /><path d="M21.95 12c0 -3 -1.85 -5.45 -5 -6.98a1.9 1.9 0 0 0 -2.56 1.07l-3.5 4.67a1.9 1.9 0 0 0 .7 2.73c2.15 1.53 5 3.98 5 6.98" /></svg>';
        }
      });
    });

    // Handle reset password form submission
    document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const errorDiv = document.getElementById('form-error');
      const successDiv = document.getElementById('form-success');
      
      // Hide previous messages
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      // Client-side validation
      if (!resetToken) {
        errorDiv.textContent = 'Invalid reset link. Please request a new password reset.';
        errorDiv.style.display = 'block';
        showToast('Invalid reset link. Please request a new password reset.', 'error');
        return;
      }
      
      if (newPassword.length < 6) {
        errorDiv.textContent = 'Password must be at least 6 characters';
        errorDiv.style.display = 'block';
        showToast('Password must be at least 6 characters', 'error');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.style.display = 'block';
        showToast('Passwords do not match', 'error');
        return;
      }
      
      try {
        const response = await fetch('https://facial-attendance-system-production.up.railway.app/api/auth/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            token: resetToken,
            newPassword,
            confirmPassword
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          successDiv.textContent = data.message;
          successDiv.style.display = 'block';
          showToast(data.message, 'success');
          
          // Redirect to login after 3 seconds
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
        } else {
          errorDiv.textContent = data.message || 'Failed to reset password';
          errorDiv.style.display = 'block';
          showToast(data.message || 'Failed to reset password', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.style.display = 'block';
        showToast('An error occurred. Please try again.', 'error');
      }
    });

    // Check for valid token on page load
    if (!resetToken) {
      document.getElementById('form-error').textContent = 'Invalid or missing reset token. Please request a new password reset.';
      document.getElementById('form-error').style.display = 'block';
    }
  </script>
</body>
</html>
